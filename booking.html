<!DOCTYPE html>
<html>

<head>

    <title>Book House</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="mb-4">
            Book House
        </h2>

        <form method="POST">

            <input type="text"
                   name="user_name"
                   class="form-control mb-3"
                   placeholder="Your Name"
                   required>

            <input type="email"
                   name="user_email"
                   class="form-control mb-3"
                   placeholder="Your Email"
                   required>

            <textarea name="message"
                      class="form-control mb-3"
                      placeholder="Message"
                      rows="4"></textarea>

            <button type="submit"
                    class="btn btn-primary">

                Submit Booking

            </button>

        </form>

    </div>

</div>

</body>
</html>
