<!DOCTYPE html>
<html>

<head>

    <title>Edit House</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Edit House
    </h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" class="form-control">
        <div class="mb-3">

    <label class="form-label">

        House Image

    </label>

    <input type="file"
           name="image"
           class="form-control">

</div>

        <div class="mb-3">

            <label class="form-label">
                House Name
            </label>

            <input type="text"
                   name="house_name"
                   class="form-control"
                   value="{{ house[1] }}"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Location
            </label>

            <input type="text"
                   name="location"
                   class="form-control"
                   value="{{ house[2] }}"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Rent
            </label>

            <input type="number"
                   name="rent"
                   class="form-control"
                   value="{{ house[3] }}"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Description
            </label>

            <textarea name="description"
                      class="form-control"
                      rows="4"
                      required>{{ house[4] }}</textarea>

        </div>

        <button type="submit"
                class="btn btn-success">

            Update House

        </button>

        <a href="/admin/houses"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

</body>
</html>
